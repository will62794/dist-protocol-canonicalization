name: Compile LaTeX document

on:
  push:
    branches:
      - main  # Adjust this to your main branch name

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v2
      
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install texlive-full -y  # Installs full TeXLive distribution
      
      - name: Compile LaTeX document
        run: |
          cd paper
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          # Add additional commands if needed, e.g., bibtex, makeindex, etc.
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} 
          asset_path: ./paper/main.pdf
          asset_name: main.pdf
          asset_content_type: pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v2
        with:
          name: output-pdf
          path: paper/main.pdf  # Replace with your main output PDF file
